services:
  - type: web
    name: retunra-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:migrate:prod
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Copy from Neon dashboard (use the pooled connection string for Render).
      - key: DATABASE_URL
        sync: false
      # From Upstash dashboard → REST API
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
